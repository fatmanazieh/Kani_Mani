<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>ARMS Gateway - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#b6c7e9",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-container": "#301700",
                        "on-primary-container": "#7586a5",
                        "outline-variant": "#c5c6ce",
                        "on-secondary-fixed-variant": "#5d4201",
                        "error-container": "#ffdad6",
                        "inverse-on-surface": "#eff1f3",
                        "surface-container-high": "#e6e8ea",
                        "surface-container": "#eceef0",
                        "primary": "#00030a",
                        "tertiary-fixed": "#ffdcc0",
                        "surface-container-low": "#f2f4f6",
                        "primary-fixed": "#d6e3ff",
                        "inverse-surface": "#2d3133",
                        "surface-variant": "#e0e3e5",
                        "secondary-fixed-dim": "#e9c176",
                        "error": "#ba1a1a",
                        "inverse-primary": "#b6c7e9",
                        "on-tertiary-container": "#a67d59",
                        "secondary-fixed": "#ffdea5",
                        "surface-bright": "#f7f9fb",
                        "on-tertiary-fixed": "#2e1600",
                        "primary-container": "#0a1d37",
                        "on-surface-variant": "#44474d",
                        "tertiary": "#070200",
                        "background": "#f7f9fb",
                        "outline": "#75777e",
                        "on-error-container": "#93000a",
                        "on-primary-fixed-variant": "#364763",
                        "tertiary-fixed-dim": "#edbd95",
                        "surface": "#f7f9fb",
                        "on-primary": "#ffffff",
                        "on-error": "#ffffff",
                        "on-background": "#191c1e",
                        "surface-container-highest": "#e0e3e5",
                        "secondary": "#775a19",
                        "on-secondary-container": "#785a1a",
                        "surface-dim": "#d8dadc",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed": "#081c36",
                        "on-surface": "#191c1e",
                        "secondary-container": "#fed488",
                        "on-tertiary-fixed-variant": "#604021",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#4e5f7c",
                        "on-secondary-fixed": "#261900"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .tonal-layering {
            background: linear-gradient(135deg, #f7f9fb 0%, #f2f4f6 100%);
        }
    </style>
    <script src="script.js" defer></script>
</head>

<body class="tonal-layering min-h-screen flex items-center justify-center p-6 text-on-surface">
    <div class="max-w-md w-full">
        <!-- Brand Identification Section -->
        <div class="text-center mb-10">
            <div class="inline-block mb-6 p-4 bg-primary-container rounded-xl shadow-lg">
                <img alt="Academy Crest" class="h-16 w-16 object-contain"
                    data-alt="Official crest of the Arab Academy for Science Technology and Maritime Transport in white on a deep navy background"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuBdotqbVHhkBUpPIF2R4GAbuas_t6gumMYcIIC39S5QJMhF0UlpMny9R9sn0eZddyyanuEgZJdOip0WDDOtGZqicUDcEiiQ8pTXngDUCF5hP_9ttq_mbqhG1xWuJfZ9zyuenAjAPBXE2DFjVSSB1yIlEqiV1xEWNeGlW22Snfvy3By3xfjbFRRZbe10KXuI1yYkcZZ5qSi0JcTB6PYpXl0ZbbiWiaZbAeFMvjQoSxpFB7YbS3UReaPhcdT7ZErEFE_SfN_ra-_PIWwo" />
            </div>
            <h1 class="text-[1.75rem] font-bold tracking-[-0.02em] text-primary-container font-headline mb-2">ARMS
                Gateway</h1>
            <p class="text-on-surface-variant text-sm font-medium tracking-wide">Academic Resource Management System</p>
        </div>
        <!-- Login Card -->
        <div
            class="bg-surface-container-lowest rounded-lg shadow-[0px_12px_32px_rgba(10,29,55,0.04)] p-10 border border-outline-variant/10">
            <form class="space-y-6">
                <!-- Name Field -->
                <div>
                    <label
                        class="block text-[0.6875rem] font-bold uppercase tracking-[0.05em] text-on-surface-variant mb-2"
                        for="name">Full Name</label>
                    <div class="relative group">
                        <div
                            class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant/50">
                            <span class="material-symbols-outlined text-[20px]" data-icon="person">person</span>
                        </div>
                        <input
                            class="block w-full pl-11 pr-4 py-3 bg-surface-container-high border-none rounded focus:ring-2 focus:ring-secondary/20 focus:bg-surface-container-lowest transition-all text-sm font-medium"
                            id="name" name="name" placeholder="Enter your full name" type="text" />
                    </div>
                </div>
                <!-- Employee ID Field -->
                <div>
                    <label
                        class="block text-[0.6875rem] font-bold uppercase tracking-[0.05em] text-on-surface-variant mb-2"
                        for="employee_id">Employee ID</label>
                    <div class="relative group">
                        <div
                            class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant/50">
                            <span class="material-symbols-outlined text-[20px]" data-icon="badge">badge</span>
                        </div>
                        <input
                            class="block w-full pl-11 pr-4 py-3 bg-surface-container-high border-none rounded focus:ring-2 focus:ring-secondary/20 focus:bg-surface-container-lowest transition-all text-sm font-medium"
                            id="employee_id" name="employee_id" placeholder="Unique Identifier" type="text" />
                    </div>
                </div>
                <!-- Password Field -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label
                            class="block text-[0.6875rem] font-bold uppercase tracking-[0.05em] text-on-surface-variant"
                            for="password">Password</label>
                        <a class="text-[0.6875rem] font-bold text-secondary uppercase tracking-[0.05em] hover:opacity-80 transition-opacity"
                            href="#">Forgot?</a>
                    </div>
                    <div class="relative group">
                        <div
                            class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-on-surface-variant/50">
                            <span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
                        </div>
                        <input
                            class="block w-full pl-11 pr-12 py-3 bg-surface-container-high border-none rounded focus:ring-2 focus:ring-secondary/20 focus:bg-surface-container-lowest transition-all text-sm font-medium"
                            id="password" name="password" placeholder="••••••••" type="password" />
                        <div
                            class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer text-on-surface-variant/50 hover:text-on-surface">
                            <span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
                        </div>
                    </div>
                </div>
                <!-- Remember Me -->
                <div class="flex items-center">
                    <input class="h-4 w-4 text-secondary border-outline-variant/30 rounded focus:ring-secondary/20"
                        id="remember" type="checkbox" />
                    <label class="ml-2 block text-xs font-medium text-on-surface-variant" for="remember">Secure Session:
                        Remember my credentials</label>
                </div>
                <!-- CTA Button -->
                <button
                    class="w-full bg-[#C5A059] text-white py-4 rounded font-bold text-sm tracking-widest uppercase shadow-md hover:shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2"
                    type="button" onclick="window.location.href='AdminMaster.html'">
                    <span>Login</span>
                    <span class="material-symbols-outlined text-[18px]" data-icon="login">login</span>
                </button>
            </form>
        </div>
        <!-- Academic Footer Info -->
        <div class="mt-8 flex flex-col md:flex-row justify-between items-center gap-4 text-on-surface-variant/60">
            <p class="text-[0.6875rem] font-medium tracking-wide">© 2024 AASTMT Academy Resource Management</p>
            <div class="flex gap-4">
                <a class="text-[0.6875rem] font-bold uppercase tracking-[0.05em] hover:text-secondary transition-colors"
                    href="#">Help Center</a>
                <span class="text-outline-variant/30">|</span>
                <a class="text-[0.6875rem] font-bold uppercase tracking-[0.05em] hover:text-secondary transition-colors"
                    href="#">Privacy</a>
            </div>
        </div>
    </div>
    <!-- Background Decoration (Asymmetric & Editorial) -->
    <div class="fixed top-0 right-0 -z-10 opacity-5 pointer-events-none">
        <span class="material-symbols-outlined text-[400px] leading-none"
            data-icon="account_balance">account_balance</span>
    </div>
    <div class="fixed bottom-[-100px] left-[-100px] -z-10 opacity-[0.03] pointer-events-none">
        <div class="w-[500px] h-[500px] bg-secondary-container rounded-full blur-[100px]"></div>
    </div>
</body>

</html>
